<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-prof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1b1f" />
      <stop offset="100%" stop-color="#121115" />
    </linearGradient>
    <linearGradient id="gold-grad-prof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb900" />
      <stop offset="100%" stop-color="#ff8400" />
    </linearGradient>
    <radialGradient id="ring-glow" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#ffb900" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff8400" stop-opacity="0.2" />
    </radialGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="125" cy="125" r="120" fill="url(#bg-grad-prof)" stroke="url(#gold-grad-prof)" stroke-width="4" />
  
  <!-- Subtle inner background pattern -->
  <circle cx="125" cy="125" r="105" fill="none" stroke="#2d2c30" stroke-width="1" stroke-dasharray="6,4" />

  <!-- Abstract Character Head and Microphone (Silhouette / Iconography) -->
  <g transform="translate(125, 115) scale(1.1)">
    <!-- Headphones behind the mic -->
    <path d="M -35,10 C -35,-35 35,-35 35,10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <rect x="-38" y="5" width="6" height="14" rx="2" fill="#ffffff" />
    <rect x="32" y="5" width="6" height="14" rx="2" fill="#ffffff" />

    <!-- Microphone body -->
    <rect x="-12" y="-22" width="24" height="34" rx="12" fill="url(#gold-grad-prof)" />
    <!-- Microphone grill details -->
    <line x1="-12" y1="-10" x2="12" y2="-10" stroke="#1c1b1f" stroke-width="2.5" />
    <line x1="-12" y1="-2" x2="12" y2="-2" stroke="#1c1b1f" stroke-width="2.5" />
    <line x1="0" y1="-22" x2="0" y2="12" stroke="#1c1b1f" stroke-width="1.5" stroke-dasharray="3,3" />

    <!-- Microphone Stand -->
    <path d="M -16,5 C -16,22 16,22 16,5" fill="none" stroke="#ffffff" stroke-width="3" />
    <line x1="0" y1="20" x2="0" y2="35" stroke="#ffffff" stroke-width="3.5" />
    <path d="M -12,35 L 12,35" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Star sparks representing creativity -->
  <path d="M 50,60 L 52,65 L 57,67 L 52,69 L 50,74 L 48,69 L 43,67 L 48,65 Z" fill="#ffb900" opacity="0.8" />
  <path d="M 195,70 L 196.5,74 L 201,75.5 L 196.5,77 L 195,81 L 193.5,77 L 189,75.5 L 193.5,74 Z" fill="#ffb900" opacity="0.8" />
</svg>
