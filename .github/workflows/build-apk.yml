name: Build Android APK
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ۱. د نوي او باثباته Node.js نسخه تنظیمول ترڅو د زړې نسخې خبرداری ورنکړي
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ۲. د اړینو کڅوړو انسټالول
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install --legacy-peer-deps @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets @capacitor/share @capacitor/filesystem @capacitor/local-notifications

      # ۳. د ویب پاڼې بلډ جوړول
      - name: Build Web App
        run: npm run build

      # ۴. د Capacitor سره همغږي او اندروید پروژې رامنځته کول
      - name: Initialize and Add Android
        run: |
          # د مخکې جوړ شوي capacitor.config.ts په مرسته اندروید اضافه کړئ
          npx cap add android
          npx cap sync android

      # ۵. د شبکې، فایلونو او نوټیفیکیشنونو اجازې سمول (په مانیفیسټ کې)
      - name: Configure Android Manifest Permissions
        run: |
          cd android/app/src/main
          
          # په خوندي توګه د انټرنیټ او د فایلونو لوستلو/لیکلو او نوټیفیکیشنونو اجازې اضافه کول
          grep -q "android.permission.INTERNET" AndroidManifest.xml || sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' AndroidManifest.xml
          grep -q "android.permission.READ_EXTERNAL_STORAGE" AndroidManifest.xml || sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' AndroidManifest.xml
          grep -q "android.permission.WRITE_EXTERNAL_STORAGE" AndroidManifest.xml || sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' AndroidManifest.xml
          grep -q "android.permission.POST_NOTIFICATIONS" AndroidManifest.xml || sed -i '/<manifest/a \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' AndroidManifest.xml
          grep -q "android.permission.READ_MEDIA_IMAGES" AndroidManifest.xml || sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' AndroidManifest.xml
          
          # د دباوند او HTTP ټرافیک (Cleartext) او میراثي سټوریج طریقه فعاله کول
          sed -i 's/<application/<application android:usesCleartextTraffic="true" android:requestLegacyExternalStorage="true"/g' AndroidManifest.xml
          
          # د مانیفیسټ کتنه
          cat AndroidManifest.xml

      # ۶. د جاوا ۲۱ لوډول (د AGP 8.x او Gradle او د نوي Capacitor نسخو لپاره اړینه نسخه)
      # په دې ځای کې د Java لوډول ترسره کیږي ترڅو د 'No file matched to build.gradle' خطا رانشي، ځکه چې د اندروید فولډر لا دمخه په پورته ګام کې جوړ شوی دی.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'
          cache-dependency-path: 'android/build.gradle'

      # ۷. د آیکن او لوګو برخه
      - name: Generate Icon
        run: |
          if [ -f "logo.png" ]; then
            mkdir -p assets
            cp logo.png assets/icon.png
            npx capacitor-assets generate --android
          elif [ -f "src/assets/logo.png" ]; then
            mkdir -p assets
            cp src/assets/logo.png assets/icon.png
            npx capacitor-assets generate --android
          else
            echo "Warning: No logo found, skipping icon generation."
          fi

      # ۸. د Kotlin نسخه همغږي کول ترڅو د Duplicates شخړه رامنځته نشي
      - name: Fix Kotlin Dependency Conflict
        run: |
          cd android
          echo "" >> build.gradle
          echo "allprojects {" >> build.gradle
          echo "    configurations.all {" >> build.gradle
          echo "        resolutionStrategy {" >> build.gradle
          echo "            force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22'" >> build.gradle
          echo "            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22'" >> build.gradle
          echo "            force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22'" >> build.gradle
          echo "        }" >> build.gradle
          echo "    }" >> build.gradle
          echo "}" >> build.gradle

      # ۹. د Debug او Release APK جوړول
      - name: Build Android APK (Debug & Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      # ۱۰. د اپلیکیشن رسمي لاسلیک کول
      - name: Sign Release APK with Custom Keystore
        run: |
          # د لاسلیک جوړول
          keytool -genkeypair -v -keystore release.keystore \
            -alias love-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "AmanMediaLove123" \
            -keypass "AmanMediaLove123" \
            -dname "CN=Aman Media, OU=Mobile, O=Aman Media, L=Kabul, S=Kabul, C=AF"
          
          # د apksigner پېژندنه
          apksigner_path=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -n 1)
          echo "Using apksigner at: $apksigner_path"
          
          # د غیر لاسلیک شوي اپلیکیشن موندل
          unsigned_apk=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$unsigned_apk" ]; then
            echo "Error: Unsigned release APK not found!"
            exit 1
          fi
          echo "Found unsigned release APK: $unsigned_apk"
          
          # لاسلیک کول
          $apksigner_path sign --ks release.keystore \
            --ks-key-alias love-key \
            -ks-pass pass:AmanMediaLove123 \
            --key-pass pass:AmanMediaLove123 \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            "$unsigned_apk"
          
          # تایید کول
          $apksigner_path verify android/app/build/outputs/apk/release/app-release-signed.apk
          echo "Release APK successfully signed!"

      # ۱۱. د اپلیکیشن پورته کول (Artifacts)
      - name: Upload Signed and Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: Minedewa-App-APKs
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-signed.apk
